name: Daily Reader Digest

on:
  schedule:
    - cron: '30 1 * * *'  # 1:30 UTC = 7:00 AM IST
  workflow_dispatch:  # manual trigger

permissions:
  contents: write

jobs:
  generate-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install tools
        run: |
          npm install -g @readwise/cli @anthropic-ai/claude-code
          echo "$(npm config get prefix)/bin" >> $GITHUB_PATH

      - name: Authenticate Readwise
        run: readwise login-with-token "${{ secrets.READWISE_TOKEN }}"

      - name: Generate digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          TODAY=$(date +%Y-%m-%d)
          MONTH_DAY=$(date +"%B %d, %Y")
          CUTOFF=$(date -u -d '24 hours ago' +%Y-%m-%dT%H:%M:%SZ)

          # Check if digest already exists
          if [ -f "_digests/digest-${TODAY}.md" ]; then
            echo "Digest for ${TODAY} already exists, skipping."
            exit 0
          fi

          claude -p "You are generating a sharp daily reading digest — intelligence briefings, not book reports.

          ## Fetch
          1. Fetch documents from Readwise Reader updated after ${CUTOFF} from all three locations (new, later, feed). Run each as a separate command:
             readwise reader-list-documents --location new --updated-after \"${CUTOFF}\" --limit 50 --json
             readwise reader-list-documents --location later --updated-after \"${CUTOFF}\" --limit 50 --json
             readwise reader-list-documents --location feed --updated-after \"${CUTOFF}\" --limit 50 --json
          If all return zero results, expand to 48 hours and retry.

          2. Deduplicate by title (keep highest word count). Classify: Substantive (800+ words) vs Brief (<800).

          3. For each document, fetch full content:
             readwise reader-get-document-details --document-id <id> --json
             NEVER pipe commands. Run each standalone. Use the Agent tool for parallel batches.

          ## Analyze
          For each substantive doc, produce:
          - **Triage signal**: ⚡ must-read (max 3 per digest), 📌 worth a look, 📎 skim. Be ruthless.
          - **Why read this** (1-2 sentences): The single most compelling reason to open this. Be specific and punchy.
          - **Sharp takes** (exactly 3): Lead with surprise ('wait, really?'). Name the mechanism. Include the so-what. When possible, one take should be a tension or disagreement.
          - **Quotable** (exactly 1): Best quote + italicized context tag (who said it, about what, why it's sharp).

          For brief docs: 1 sentence + one data point.

          ## Format
          Start with 'Today's Top 3' section picking the best articles. Then group by theme. Format:

          ### [Title] ⚡/📌/📎
          **[Author]** · [Source] · [X] min

          **Why read this:** [1-2 sentences]

          **Sharp takes:**
          - [take 1]
          - [take 2]
          - [take 3]

          **Quotable:**
          > \"[quote]\" — *[context]*

          For briefs: ### [Title] 📎 / **[Author]** · [X] min / [one sentence + data point]

          ## Save
          Save to _digests/digest-${TODAY}.md with front matter:
          ---
          layout: digest
          title: \"Reader Digest — ${MONTH_DAY}\"
          date: ${TODAY}
          ---
          Do NOT include a # h1 title in the body.

          ## Rules
          - Process EVERY document. Never skip any.
          - Lead with surprise, not summary. No generic statements.
          - Max 3 ⚡ per digest. Most articles are 📌 or 📎.
          - NEVER use piped commands." --allowedTools "Bash,Read,Write,Edit,Agent"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _digests/
          if git diff --cached --quiet; then
            echo "No new digest to commit"
          else
            git commit -m "Add digest for $(date +%Y-%m-%d)"
            git push
          fi

      - name: Email digest
        if: hashFiles(format('_digests/digest-{0}.md', env.TODAY)) != ''
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TODAY: ${{ env.TODAY }}
        run: |
          TODAY=$(date +%Y-%m-%d)
          MONTH_DAY=$(date +"%B %d, %Y")
          DIGEST_FILE="_digests/digest-${TODAY}.md"

          if [ ! -f "$DIGEST_FILE" ]; then
            echo "No digest file found, skipping email"
            exit 0
          fi

          # Convert markdown to HTML and send via Gmail SMTP
          python3 -c "
          import smtplib, subprocess, sys
          from email.mime.text import MIMEText
          from email.mime.multipart import MIMEMultipart
          import re

          with open('${DIGEST_FILE}', 'r') as f:
              content = f.read()

          # Strip YAML front matter
          content = re.sub(r'^---\n.*?\n---\n', '', content, flags=re.DOTALL)

          # Basic markdown to HTML
          html = content
          # Headers
          html = re.sub(r'^### (.+)$', r'<h3>\1</h3>', html, flags=re.MULTILINE)
          html = re.sub(r'^## (.+)$', r'<h2>\1</h2>', html, flags=re.MULTILINE)
          # Bold
          html = re.sub(r'\*\*(.+?)\*\*', r'<strong>\1</strong>', html)
          # Italic
          html = re.sub(r'\*(.+?)\*', r'<em>\1</em>', html)
          # Blockquotes
          html = re.sub(r'^> (.+)$', r'<blockquote style=\"border-left:3px solid #6366f1;padding-left:12px;color:#555;margin:8px 0\">\1</blockquote>', html, flags=re.MULTILINE)
          # List items
          html = re.sub(r'^- (.+)$', r'<li>\1</li>', html, flags=re.MULTILINE)
          # Horizontal rules
          html = re.sub(r'^---$', '<hr style=\"border:none;border-top:1px solid #e5e7eb;margin:16px 0\">', html, flags=re.MULTILINE)
          # Paragraphs
          html = re.sub(r'\n\n', '</p><p>', html)
          html = f'<div style=\"font-family:-apple-system,system-ui,sans-serif;max-width:700px;margin:0 auto;line-height:1.6;color:#1a1a1a\"><p>{html}</p></div>'

          msg = MIMEMultipart('alternative')
          msg['Subject'] = 'Reader Digest — ${MONTH_DAY}'
          msg['From'] = 'rohit@rohitkaul.com'
          msg['To'] = 'rohit@rohitkaul.com'
          msg.attach(MIMEText(content, 'plain'))
          msg.attach(MIMEText(html, 'html'))

          import os
          password = os.environ['GMAIL_APP_PASSWORD']
          with smtplib.SMTP_SSL('smtp.gmail.com', 465) as server:
              server.login('rohit@rohitkaul.com', password)
              server.send_message(msg)
          print('Email sent successfully')
          "
