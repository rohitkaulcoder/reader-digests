name: Daily Reader Digest

on:
  schedule:
    - cron: '30 1 * * *'  # 1:30 UTC = 7:00 AM IST
  workflow_dispatch:  # manual trigger

permissions:
  contents: write

concurrency:
  group: daily-digest
  cancel-in-progress: false

jobs:
  generate-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install tools
        run: |
          npm install -g @readwise/cli @anthropic-ai/claude-code
          echo "$(npm config get prefix)/bin" >> $GITHUB_PATH

      - name: Authenticate Readwise
        run: readwise login-with-token "${{ secrets.READWISE_TOKEN }}"

      - name: Generate digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          TODAY=$(date +%Y-%m-%d)
          MONTH_DAY=$(date +"%B %d, %Y")
          CUTOFF=$(date -u -d '24 hours ago' +%Y-%m-%dT%H:%M:%SZ)

          # Check if digest already exists
          if [ -f "_digests/digest-${TODAY}.md" ]; then
            echo "Digest for ${TODAY} already exists, skipping."
            exit 0
          fi

          claude -p --model sonnet --output-format json "You are generating a sharp daily reading digest — intelligence briefings, not book reports.

          ## Fetch
          1. Fetch documents from Readwise Reader updated after ${CUTOFF} from all three locations (new, later, feed). Run each as a separate command:
             readwise reader-list-documents --location new --updated-after \"${CUTOFF}\" --limit 50 --json
             readwise reader-list-documents --location later --updated-after \"${CUTOFF}\" --limit 50 --json
             readwise reader-list-documents --location feed --updated-after \"${CUTOFF}\" --limit 50 --json
          If all return zero results, expand to 48 hours and retry.

          2. Deduplicate by title (keep highest word count). Classify: Substantive (800+ words) vs Brief (<800).

          3. For each document, fetch full content:
             readwise reader-get-document-details --document-id <id> --json
             NEVER pipe commands. Run each standalone. Use the Agent tool for parallel batches.

          ## Analyze
          For each substantive doc, produce:
          - **Triage signal**: ⚡ must-read (max 3 per digest), 📌 worth a look, 📎 skim. Be ruthless.
          - **Why read this** (1-2 sentences): The single most compelling reason to open this. Be specific and punchy.
          - **Sharp takes** (exactly 3): Lead with surprise ('wait, really?'). Name the mechanism. Include the so-what. When possible, one take should be a tension or disagreement.
          - **Quotable** (exactly 1): Best quote + italicized context tag (who said it, about what, why it's sharp).

          For brief docs: 1 sentence + one data point.

          ## Format
          Start with 'Today's Top 3' section picking the best articles. Then group by theme. Format:

          ### [Title] ⚡/📌/📎
          **[Author]** · [Source] · [X] min

          **Why read this:** [1-2 sentences]

          **Sharp takes:**
          - [take 1]
          - [take 2]
          - [take 3]

          **Quotable:**
          > \"[quote]\" — *[context]*

          For briefs: ### [Title] 📎 / **[Author]** · [X] min / [one sentence + data point]

          ## Save
          Save to _digests/digest-${TODAY}.md with front matter:
          ---
          layout: digest
          title: \"Reader Digest — ${MONTH_DAY}\"
          date: ${TODAY}
          ---
          Do NOT include a # h1 title in the body.

          ## Rules
          - Process EVERY document. Never skip any.
          - Lead with surprise, not summary. No generic statements.
          - Max 3 ⚡ per digest. Most articles are 📌 or 📎.
          - NEVER use piped commands." --allowedTools "Bash,Read,Write,Edit,Agent" > /tmp/claude_output.json

          # Extract cost stats from Claude JSON output
          python3 -c "
          import json
          with open('/tmp/claude_output.json') as f:
              data = json.load(f)
          usage = data.get('usage', {})
          input_tokens = usage.get('input_tokens', 0)
          output_tokens = usage.get('output_tokens', 0)
          cache_read = usage.get('cache_read_input_tokens', 0)
          cache_create = usage.get('cache_creation_input_tokens', 0)
          # Sonnet pricing: $3/M input, $15/M output, $0.30/M cache read, $3.75/M cache write
          cost_input = (input_tokens / 1_000_000) * 3.0
          cost_output = (output_tokens / 1_000_000) * 15.0
          cost_cache_read = (cache_read / 1_000_000) * 0.30
          cost_cache_create = (cache_create / 1_000_000) * 3.75
          total = cost_input + cost_output + cost_cache_read + cost_cache_create
          stats = f'Tokens: {input_tokens:,} in / {output_tokens:,} out'
          if cache_read: stats += f' / {cache_read:,} cache read'
          print(f'{stats} | Cost: \${total:.2f}')
          with open('/tmp/digest_cost.txt', 'w') as f:
              f.write(f'{stats} | Cost: \${total:.2f}')
          import os
          with open(os.environ.get('GITHUB_ENV', '/dev/null'), 'a') as env:
              env.write(f'COST_LINE={stats} | Cost: \${total:.2f}\n')
          " || echo "Could not parse usage stats"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Stage any untracked/modified digest files Claude may not have committed
          git add _digests/
          if ! git diff --cached --quiet; then
            git commit -m "Add digest for $(date +%Y-%m-%d)"
          fi
          # Push everything (including any commits Claude made during generation)
          git pull --rebase
          git push

      - name: Email digest via Resend
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          TODAY=$(date +%Y-%m-%d)
          DIGEST_FILE="_digests/digest-${TODAY}.md"

          if [ ! -f "$DIGEST_FILE" ]; then
            echo "No digest file for today, skipping email."
            exit 0
          fi

          # Read cost stats if available
          COST_LINE=""
          if [ -f /tmp/digest_cost.txt ]; then
            COST_LINE=$(cat /tmp/digest_cost.txt)
          fi

          # Strip YAML front matter and convert markdown to basic HTML
          BODY=$(sed '1{/^---$/!q;};1,/^---$/d' "$DIGEST_FILE" \
            | python3 -c "
          import sys, html, re, os
          md = sys.stdin.read()
          cost = os.environ.get('COST_LINE', '')
          # Escape HTML entities
          md = html.escape(md)
          # Bold
          md = re.sub(r'\*\*(.+?)\*\*', r'<strong>\1</strong>', md)
          # Italic
          md = re.sub(r'\*(.+?)\*', r'<em>\1</em>', md)
          # H3
          md = re.sub(r'^### (.+)$', r'<h3>\1</h3>', md, flags=re.MULTILINE)
          # H2
          md = re.sub(r'^## (.+)$', r'<h2>\1</h2>', md, flags=re.MULTILINE)
          # Blockquotes
          md = re.sub(r'^&gt; (.+)$', r'<blockquote>\1</blockquote>', md, flags=re.MULTILINE)
          # List items
          md = re.sub(r'^- (.+)$', r'<li>\1</li>', md, flags=re.MULTILINE)
          # Paragraphs (double newline)
          md = re.sub(r'\n\n', r'</p><p>', md)
          # Single newlines to <br>
          md = re.sub(r'\n', r'<br>', md)
          footer = ''
          if cost:
              footer = f'<hr style=\"border:none;border-top:1px solid #eee;margin:24px 0 12px\"><p style=\"color:#999;font-size:12px\">{html.escape(cost)}</p>'
          print('<div style=\"font-family: -apple-system, sans-serif; max-width: 680px; margin: 0 auto; padding: 20px; line-height: 1.6;\"><p>' + md + '</p>' + footer + '</div>')
          ")

          MONTH_DAY=$(date +"%B %d, %Y")

          curl -s -X POST 'https://api.resend.com/emails' \
            -H "Authorization: Bearer ${RESEND_API_KEY}" \
            -H 'Content-Type: application/json' \
            -d "$(python3 -c "
          import json, sys
          body = sys.stdin.read()
          print(json.dumps({
            'from': 'Reader Digest <onboarding@resend.dev>',
            'to': ['rohit@rohitkaul.com'],
            'subject': 'Reader Digest — ${MONTH_DAY}',
            'html': body
          }))
          " <<< "$BODY")"

          echo "Digest email sent!"

