name: Daily Reader Digest

on:
  workflow_dispatch:  # triggered externally by cron-job.org

permissions:
  contents: write

concurrency:
  group: daily-digest
  cancel-in-progress: false

jobs:
  generate-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install tools
        run: |
          npm install -g @readwise/cli @anthropic-ai/claude-code
          echo "$(npm config get prefix)/bin" >> $GITHUB_PATH

      - name: Security check
        run: |
          if npm ls -g axios 2>/dev/null | grep -q "plain-crypto-js"; then
            echo "::error::SUPPLY CHAIN ALERT: axios has compromised dependency plain-crypto-js"
            exit 1
          fi

      - name: Authenticate Readwise
        run: readwise login-with-token "${{ secrets.READWISE_TOKEN }}"

      - name: Pre-check
        run: |
          TODAY=$(date +%Y-%m-%d)
          if [ -f "_digests/digest-${TODAY}.md" ]; then
            echo "Digest for ${TODAY} already exists, skipping."
            echo "SKIP_DIGEST=true" >> $GITHUB_ENV
          fi

      - name: Fetch article metadata (slim)
        if: env.SKIP_DIGEST != 'true'
        run: |
          CUTOFF=$(date -u -d '24 hours ago' +%Y-%m-%dT%H:%M:%SZ)
          mkdir -p /tmp/articles

          KEEP_FIELDS='["id","title","author","summary","word_count","reading_time","category","source_url","published_date"]'

          # Fetch from all three locations, strip to slim metadata
          for loc in new later feed; do
            readwise reader-list-documents \
              --location "$loc" \
              --updated-after "$CUTOFF" \
              --limit 50 \
              --json > "/tmp/articles/raw_${loc}.json"

            # Strip to slim fields (drops html_content, 42KB→600B per doc)
            python3 -c "
          import json
          keep = set(json.loads('${KEEP_FIELDS}'))
          raw = json.load(open('/tmp/articles/raw_${loc}.json'))
          docs = raw.get('results', raw) if isinstance(raw, dict) else raw
          if not isinstance(docs, list): docs = []
          slim = [{k: d.get(k) for k in keep} for d in docs]
          for d in slim: d['location'] = '${loc}'
          json.dump(slim, open('/tmp/articles/list_${loc}.json', 'w'), indent=2)
          print(f'Fetched ${loc}: {len(slim)} docs')
          "
          done

          # Merge, deduplicate by title (keep highest word count)
          python3 -c "
          import json, os
          seen = {}
          for loc in ['new', 'later', 'feed']:
              path = f'/tmp/articles/list_{loc}.json'
              if os.path.exists(path):
                  for d in json.load(open(path)):
                      title = d.get('title') or ''
                      wc = d.get('word_count') or 0
                      if title and (title not in seen or wc > (seen[title].get('word_count') or 0)):
                          seen[title] = d
          all_docs = list(seen.values())
          print(f'Total unique docs: {len(all_docs)}')
          json.dump(all_docs, open('/tmp/articles/metadata.json', 'w'), indent=2)
          "

          # If no docs found, try 48-hour window
          DOC_COUNT=$(python3 -c "import json; print(len(json.load(open('/tmp/articles/metadata.json'))))")
          if [ "$DOC_COUNT" = "0" ]; then
            echo "No docs in 24h window, expanding to 48h..."
            CUTOFF=$(date -u -d '48 hours ago' +%Y-%m-%dT%H:%M:%SZ)
            for loc in new later feed; do
              readwise reader-list-documents \
                --location "$loc" \
                --updated-after "$CUTOFF" \
                --limit 50 \
                --json > "/tmp/articles/raw_${loc}.json"

              python3 -c "
          import json
          keep = set(json.loads('${KEEP_FIELDS}'))
          raw = json.load(open('/tmp/articles/raw_${loc}.json'))
          docs = raw.get('results', raw) if isinstance(raw, dict) else raw
          if not isinstance(docs, list): docs = []
          slim = [{k: d.get(k) for k in keep} for d in docs]
          for d in slim: d['location'] = '${loc}'
          json.dump(slim, open('/tmp/articles/list_${loc}.json', 'w'), indent=2)
          "
            done
            python3 -c "
          import json, os
          seen = {}
          for loc in ['new', 'later', 'feed']:
              path = f'/tmp/articles/list_{loc}.json'
              if os.path.exists(path):
                  for d in json.load(open(path)):
                      title = d.get('title') or ''
                      wc = d.get('word_count') or 0
                      if title and (title not in seen or wc > (seen[title].get('word_count') or 0)):
                          seen[title] = d
          all_docs = list(seen.values())
          print(f'Total unique docs (48h): {len(all_docs)}')
          json.dump(all_docs, open('/tmp/articles/metadata.json', 'w'), indent=2)
          "
          fi

      - name: "Stage 1: Triage & rank (Sonnet — small context)"
        if: env.SKIP_DIGEST != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if ! claude -p --model sonnet --output-format json "You are triaging articles for a daily reading digest.

          Read the file /tmp/articles/metadata.json. It contains article metadata (title, author, summary, word_count, category, source_url, published_date, id).

          Your job:
          1. Classify each article: Substantive (word_count >= 800) vs Brief (< 800).
          2. Rank substantive articles by novelty, depth, and relevance.
          3. Select the top 8-10 for full treatment. The rest are overflow.

          Write your output to /tmp/articles/triage.json with this exact structure:
          {
            \"featured\": [{\"id\": \"...\", \"title\": \"...\", \"author\": \"...\", \"word_count\": N, \"reading_time\": \"...\", \"category\": \"...\", \"source_url\": \"...\", \"summary\": \"...\", \"signal\": \"must-read|worth-a-look|skim\"}],
            \"briefs\": [{\"id\": \"...\", \"title\": \"...\", \"author\": \"...\", \"summary\": \"...\", \"word_count\": N}],
            \"overflow\": [{\"id\": \"...\", \"title\": \"...\", \"author\": \"...\", \"summary\": \"...\"}]
          }

          Rules:
          - Max 3 must-read articles. Most should be worth-a-look or skim.
          - Process EVERY document — none should be missing from the output.
          - Be ruthless in ranking. Novelty and depth beat recency." --allowedTools "Read,Write" > /tmp/stage1_output.json 2>&1; then
            echo "::error::Stage 1 claude -p failed. Output:"
            cat /tmp/stage1_output.json 2>/dev/null || echo "(no output file)"
            exit 1
          fi

          echo "Stage 1 complete"
          python3 -c "
          import json
          with open('/tmp/stage1_output.json') as f:
              data = json.load(f)
          u = data.get('usage', {})
          inp = u.get('input_tokens', 0)
          out = u.get('output_tokens', 0)
          cost = (inp / 1e6) * 3.0 + (out / 1e6) * 15.0
          print(f'Stage 1: {inp:,} in / {out:,} out | \${cost:.2f}')
          with open('/tmp/stage1_cost.txt', 'w') as f:
              f.write(f'Stage 1: {inp:,} in / {out:,} out | \${cost:.2f}')
          " || echo "Could not parse stage 1 stats"

      - name: Fetch full content for featured articles
        if: env.SKIP_DIGEST != 'true'
        run: |
          # Extract featured article IDs and fetch full content
          python3 -c "
          import json, subprocess, os
          triage = json.load(open('/tmp/articles/triage.json'))
          featured = triage.get('featured', [])
          print(f'Fetching full content for {len(featured)} featured articles...')
          for i, article in enumerate(featured):
              doc_id = article['id']
              print(f'  [{i+1}/{len(featured)}] {article.get(\"title\", doc_id)[:60]}...')
              result = subprocess.run(
                  ['readwise', 'reader-get-document-details', '--document-id', doc_id, '--json'],
                  capture_output=True, text=True, timeout=30
              )
              if result.returncode == 0:
                  details = json.loads(result.stdout)
                  # Save just the markdown content to a file
                  content = details.get('content', '')
                  with open(f'/tmp/articles/{doc_id}.md', 'w') as f:
                      f.write(content)
                  size_kb = len(content) / 1024
                  print(f'    Saved {size_kb:.0f} KB')
              else:
                  print(f'    FAILED: {result.stderr[:100]}')
          print('All featured articles fetched.')
          "

      - name: "Stage 2: Generate digest (Sonnet — reads files individually)"
        if: env.SKIP_DIGEST != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          TODAY=$(date +%Y-%m-%d)
          MONTH_DAY=$(date +"%B %d, %Y")

          if ! claude -p --model sonnet --output-format json "You are generating a comprehensive daily reading digest. The reader should get ~100% understanding of each article without opening the original.

          ## Input files
          - /tmp/articles/triage.json — contains the triage results with featured, briefs, and overflow articles.
          - /tmp/articles/<id>.md — full markdown content for each featured article (use the id from triage.json).

          ## Instructions
          1. Read /tmp/articles/triage.json to get the article list and triage signals.
          2. For each featured article, read its content from /tmp/articles/<id>.md.
          3. After reading EACH article, immediately produce its digest entry before reading the next one. This keeps your working memory focused.

          ## Analysis (for each featured article)
          - **Triage signal**: Use the signal from triage.json (⚡ must-read, 📌 worth a look, 📎 skim).
          - **Numbered arguments** scaled by reading time (~1 per 2 min): 6-min article → ~3, 15-min → ~7, 40-min → ~20. Each argument is 2-3 sentences with specific names, numbers, mechanisms, evidence.
          - **Quotable** (exactly 1): Best quote + italicized context tag.

          CRITICAL QUALITY RULE: NEVER use meta-commentary. Do NOT write 'the author argues' or 'this piece explores.' State the actual claims, evidence, and conclusions directly.
          BAD: 'The author explores the tension between biomimicry and pragmatism in robotics.'
          GOOD: 'Biomimicry may be a red herring — a slower, cruder hand that reliably grasps 90% of warehouse SKUs captures most economic value.'

          For brief docs (from briefs list): 1 sentence + one data point.

          ## Format
          Start with 'Today's Top 3' section (the 3 must-read articles). Then group featured articles by theme:

          ### [Title] ⚡/📌/📎
          **[Author]** · [Source] · [X] min

          1. [argument — 2-3 sentences, specific substance]
          2. [argument]
          ...

          **Quotable:**
          > \"[quote]\" — *[context]*

          Then a 'Briefs' section, then 'Also in Your Inbox' for overflow substantive articles (title + author + 1 sentence).

          ## Save
          Save the final digest to _digests/digest-${TODAY}.md with front matter:
          ---
          layout: digest
          title: \"Reader Digest — ${MONTH_DAY}\"
          date: ${TODAY}
          ---
          Do NOT include a # h1 title in the body.

          ## Rules
          - Process EVERY document from triage.json. None should be missing.
          - NEVER use meta-commentary. State the substance directly.
          - Scale argument count to article length (~1 per 2 min reading time).
          - Max 3 ⚡ per digest." --allowedTools "Read,Write" > /tmp/stage2_output.json 2>&1; then
            echo "::error::Stage 2 claude -p failed. Output:"
            cat /tmp/stage2_output.json 2>/dev/null || echo "(no output file)"
            exit 1
          fi

          # Combine cost stats from both stages
          python3 -c "
          import json, os
          total_in = 0
          total_out = 0
          total_cache_read = 0
          total_cost = 0
          for stage_file in ['/tmp/stage1_output.json', '/tmp/stage2_output.json']:
              if os.path.exists(stage_file):
                  data = json.load(open(stage_file))
                  u = data.get('usage', {})
                  inp = u.get('input_tokens', 0)
                  out = u.get('output_tokens', 0)
                  cr = u.get('cache_read_input_tokens', 0)
                  cc = u.get('cache_creation_input_tokens', 0)
                  total_in += inp
                  total_out += out
                  total_cache_read += cr
                  # Sonnet pricing
                  total_cost += (inp / 1e6) * 3.0 + (out / 1e6) * 15.0 + (cr / 1e6) * 0.30 + (cc / 1e6) * 3.75
          stats = f'Tokens: {total_in:,} in / {total_out:,} out'
          if total_cache_read: stats += f' / {total_cache_read:,} cache read'
          print(f'{stats} | Cost: \${total_cost:.2f}')
          with open('/tmp/digest_cost.txt', 'w') as f:
              f.write(f'{stats} | Cost: \${total_cost:.2f}')
          with open(os.environ.get('GITHUB_ENV', '/dev/null'), 'a') as env:
              env.write(f'COST_LINE={stats} | Cost: \${total_cost:.2f}\n')
          " || echo "Could not parse usage stats"

      - name: Commit and push
        if: env.SKIP_DIGEST != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Stage any untracked/modified digest files Claude may not have committed
          git add _digests/
          if ! git diff --cached --quiet; then
            git commit -m "Add digest for $(date +%Y-%m-%d)"
          fi
          # Push everything (including any commits Claude made during generation)
          git pull --rebase
          git push

      - name: Email digest via Resend
        if: env.SKIP_DIGEST != 'true'
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          TODAY=$(date +%Y-%m-%d)
          DIGEST_FILE="_digests/digest-${TODAY}.md"

          if [ ! -f "$DIGEST_FILE" ]; then
            echo "No digest file for today, skipping email."
            exit 0
          fi

          # Read cost stats if available
          COST_LINE=""
          if [ -f /tmp/digest_cost.txt ]; then
            COST_LINE=$(cat /tmp/digest_cost.txt)
          fi

          # Strip YAML front matter and convert markdown to basic HTML
          BODY=$(sed '1{/^---$/!q;};1,/^---$/d' "$DIGEST_FILE" \
            | python3 -c "
          import sys, html, re, os
          md = sys.stdin.read()
          cost = os.environ.get('COST_LINE', '')
          # Escape HTML entities
          md = html.escape(md)
          # Bold
          md = re.sub(r'\*\*(.+?)\*\*', r'<strong>\1</strong>', md)
          # Italic
          md = re.sub(r'\*(.+?)\*', r'<em>\1</em>', md)
          # H3
          md = re.sub(r'^### (.+)$', r'<h3>\1</h3>', md, flags=re.MULTILINE)
          # H2
          md = re.sub(r'^## (.+)$', r'<h2>\1</h2>', md, flags=re.MULTILINE)
          # Blockquotes
          md = re.sub(r'^&gt; (.+)$', r'<blockquote>\1</blockquote>', md, flags=re.MULTILINE)
          # Unordered list items
          md = re.sub(r'^- (.+)$', r'<li>\1</li>', md, flags=re.MULTILINE)
          # Ordered list items (numbered arguments)
          md = re.sub(r'^\d+\. (.+)$', r'<li>\1</li>', md, flags=re.MULTILINE)
          # Paragraphs (double newline)
          md = re.sub(r'\n\n', r'</p><p>', md)
          # Single newlines to <br>
          md = re.sub(r'\n', r'<br>', md)
          footer = ''
          if cost:
              footer = f'<hr style=\"border:none;border-top:1px solid #eee;margin:24px 0 12px\"><p style=\"color:#999;font-size:12px\">{html.escape(cost)}</p>'
          print('<div style=\"font-family: -apple-system, sans-serif; max-width: 680px; margin: 0 auto; padding: 20px; line-height: 1.6;\"><p>' + md + '</p>' + footer + '</div>')
          ")

          MONTH_DAY=$(date +"%B %d, %Y")

          curl -s -X POST 'https://api.resend.com/emails' \
            -H "Authorization: Bearer ${RESEND_API_KEY}" \
            -H 'Content-Type: application/json' \
            -d "$(python3 -c "
          import json, sys
          body = sys.stdin.read()
          print(json.dumps({
            'from': 'Reader Digest <onboarding@resend.dev>',
            'to': ['rohit@rohitkaul.com'],
            'subject': 'Reader Digest — ${MONTH_DAY}',
            'html': body
          }))
          " <<< "$BODY")"

          echo "Digest email sent!"

