name: Daily Reader Digest

on:
  workflow_dispatch:  # triggered externally by cron-job.org

permissions:
  contents: write

concurrency:
  group: daily-digest
  cancel-in-progress: false

jobs:
  generate-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install tools
        run: |
          npm install -g @readwise/cli @anthropic-ai/claude-code
          echo "$(npm config get prefix)/bin" >> $GITHUB_PATH

      - name: Security check
        run: |
          if npm ls -g axios 2>/dev/null | grep -q "plain-crypto-js"; then
            echo "::error::SUPPLY CHAIN ALERT: axios has compromised dependency plain-crypto-js"
            exit 1
          fi

      - name: Authenticate Readwise
        run: readwise login-with-token "${{ secrets.READWISE_TOKEN }}"

      - name: Pre-check
        run: |
          TODAY=$(date +%Y-%m-%d)
          if [ -f "_digests/digest-${TODAY}.md" ]; then
            echo "Digest for ${TODAY} already exists, skipping."
            echo "SKIP_DIGEST=true" >> $GITHUB_ENV
          fi

      - name: Fetch article metadata (slim)
        if: env.SKIP_DIGEST != 'true'
        run: |
          CUTOFF=$(date -u -d '24 hours ago' +%Y-%m-%dT%H:%M:%SZ)
          mkdir -p /tmp/articles

          KEEP_FIELDS='["id","title","author","summary","word_count","reading_time","category","source_url","published_date"]'

          # Fetch from all three locations, strip to slim metadata
          for loc in feed; do
            readwise reader-list-documents \
              --location "$loc" \
              --updated-after "$CUTOFF" \
              --limit 50 \
              --json > "/tmp/articles/raw_${loc}.json"

            # Strip to slim fields (drops html_content, 42KB→600B per doc)
            python3 -c "
          import json
          keep = set(json.loads('${KEEP_FIELDS}'))
          raw = json.load(open('/tmp/articles/raw_${loc}.json'))
          docs = raw.get('results', raw) if isinstance(raw, dict) else raw
          if not isinstance(docs, list): docs = []
          slim = [{k: d.get(k) for k in keep} for d in docs]
          for d in slim: d['location'] = '${loc}'
          json.dump(slim, open('/tmp/articles/list_${loc}.json', 'w'), indent=2)
          print(f'Fetched ${loc}: {len(slim)} docs')
          "
          done

          # Merge, deduplicate by title (keep highest word count)
          python3 -c "
          import json, os
          seen = {}
          for loc in ['feed']:
              path = f'/tmp/articles/list_{loc}.json'
              if os.path.exists(path):
                  for d in json.load(open(path)):
                      title = d.get('title') or ''
                      wc = d.get('word_count') or 0
                      if title and (title not in seen or wc > (seen[title].get('word_count') or 0)):
                          seen[title] = d
          all_docs = list(seen.values())
          print(f'Total unique docs: {len(all_docs)}')
          json.dump(all_docs, open('/tmp/articles/metadata.json', 'w'), indent=2)
          "

          # If no docs found, try 48-hour window
          DOC_COUNT=$(python3 -c "import json; print(len(json.load(open('/tmp/articles/metadata.json'))))")
          if [ "$DOC_COUNT" = "0" ]; then
            echo "No docs in 24h window, expanding to 48h..."
            CUTOFF=$(date -u -d '48 hours ago' +%Y-%m-%dT%H:%M:%SZ)
            for loc in feed; do
              readwise reader-list-documents \
                --location "$loc" \
                --updated-after "$CUTOFF" \
                --limit 50 \
                --json > "/tmp/articles/raw_${loc}.json"

              python3 -c "
          import json
          keep = set(json.loads('${KEEP_FIELDS}'))
          raw = json.load(open('/tmp/articles/raw_${loc}.json'))
          docs = raw.get('results', raw) if isinstance(raw, dict) else raw
          if not isinstance(docs, list): docs = []
          slim = [{k: d.get(k) for k in keep} for d in docs]
          for d in slim: d['location'] = '${loc}'
          json.dump(slim, open('/tmp/articles/list_${loc}.json', 'w'), indent=2)
          "
            done
            python3 -c "
          import json, os
          seen = {}
          for loc in ['feed']:
              path = f'/tmp/articles/list_{loc}.json'
              if os.path.exists(path):
                  for d in json.load(open(path)):
                      title = d.get('title') or ''
                      wc = d.get('word_count') or 0
                      if title and (title not in seen or wc > (seen[title].get('word_count') or 0)):
                          seen[title] = d
          all_docs = list(seen.values())
          print(f'Total unique docs (48h): {len(all_docs)}')
          json.dump(all_docs, open('/tmp/articles/metadata.json', 'w'), indent=2)
          "
          fi

      - name: Pre-sanitize metadata
        if: env.SKIP_DIGEST != 'true'
        run: |
          python3 << 'SANITIZE_SCRIPT'
          import json

          with open('/tmp/articles/metadata.json') as f:
              docs = json.load(f)

          for doc in docs:
              summary = doc.get('summary')
              if isinstance(summary, str):
                  # Replace problematic characters that break JSON when re-serialized
                  summary = summary.replace('\r\n', ' ').replace('\r', ' ')
                  summary = summary.replace('\t', ' ')
                  # Collapse runs of whitespace
                  summary = ' '.join(summary.split())
                  # Remove unmatched/stray double quotes that could break JSON structure
                  # Keep quotes only if they appear in balanced pairs
                  cleaned = []
                  in_quote = False
                  for ch in summary:
                      if ch == '"':
                          if not in_quote:
                              in_quote = True
                              cleaned.append('\u201c')  # left curly quote
                          else:
                              in_quote = False
                              cleaned.append('\u201d')  # right curly quote
                      else:
                          cleaned.append(ch)
                  # If we ended inside a quote, close it
                  if in_quote:
                      cleaned.append('\u201d')
                  doc['summary'] = ''.join(cleaned)

              title = doc.get('title')
              if isinstance(title, str):
                  title = title.replace('\r\n', ' ').replace('\r', ' ').replace('\t', ' ')
                  title = ' '.join(title.split())
                  doc['title'] = title

          with open('/tmp/articles/metadata.json', 'w') as f:
              json.dump(docs, f, indent=2, ensure_ascii=False)

          print(f'Sanitized metadata for {len(docs)} articles')
          SANITIZE_SCRIPT

      - name: "Stage 1: Triage & rank (Haiku — pick top 10)"
        if: env.SKIP_DIGEST != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if ! claude -p --model haiku --output-format json "You are triaging articles for a daily reading digest. Your ONLY job is to pick the top 10 most interesting articles.

          Read /tmp/articles/metadata.json. It contains article metadata (title, author, summary, word_count, category, source_url, published_date, id).

          Pick the top 10 articles ranked by novelty, depth, and relevance. Ignore articles with word_count < 300 or word_count > 15000 (books/very long reads don't belong in a daily digest).

          Write to /tmp/articles/top10.json with this exact structure:
          [
            {\"id\": \"...\", \"title\": \"...\", \"author\": \"...\", \"word_count\": N, \"reading_time\": \"...\", \"category\": \"...\", \"source_url\": \"...\", \"summary\": \"...\", \"rank\": 1},
            ...
          ]

          Rules:
          - Exactly 10 articles (or fewer if less than 10 available).
          - rank 1 = most interesting. Novelty and depth beat recency.
          - Output ONLY the JSON file. Nothing else." --allowedTools "Read,Write" > /tmp/stage1_output.json 2>&1; then
            echo "::error::Stage 1 (triage) failed. Claude output:"
            cat /tmp/stage1_output.json 2>/dev/null || echo "(no output file)"
            if [ -f /tmp/articles/top10.json ]; then
              echo "::warning::top10.json exists but stage failed. First 1000 chars:"
              head -c 1000 /tmp/articles/top10.json
            fi
            exit 1
          fi

          echo "Stage 1 complete"
          python3 -c "
          import json
          data = json.load(open('/tmp/stage1_output.json'))
          u = data.get('usage', {})
          inp, out = u.get('input_tokens', 0), u.get('output_tokens', 0)
          cost = (inp / 1e6) * 0.80 + (out / 1e6) * 4.0
          print(f'Stage 1 (Haiku): {inp:,} in / {out:,} out | \${cost:.4f}')
          " || echo "Could not parse stage 1 stats"

          # Verify top10.json is valid JSON; retry once if malformed
          if ! python3 -c "import json; json.load(open('/tmp/articles/top10.json'))" 2>/dev/null; then
            echo "::warning::Stage 1 produced malformed top10.json — dumping first 1000 chars:"
            head -c 1000 /tmp/articles/top10.json 2>/dev/null || echo "(file missing)"
            echo ""
            echo "Retrying Stage 1..."
            if ! claude -p --model haiku --output-format json "You are triaging articles for a daily reading digest. Your ONLY job is to pick the top 10 most interesting articles.

          Read /tmp/articles/metadata.json. It contains article metadata (title, author, summary, word_count, category, source_url, published_date, id).

          Pick the top 10 articles ranked by novelty, depth, and relevance. Ignore articles with word_count < 300 or word_count > 15000 (books/very long reads don't belong in a daily digest).

          Write to /tmp/articles/top10.json with this exact structure:
          [
            {\"id\": \"...\", \"title\": \"...\", \"author\": \"...\", \"word_count\": N, \"reading_time\": \"...\", \"category\": \"...\", \"source_url\": \"...\", \"summary\": \"...\", \"rank\": 1},
            ...
          ]

          Rules:
          - Exactly 10 articles (or fewer if less than 10 available).
          - rank 1 = most interesting. Novelty and depth beat recency.
          - Output ONLY the JSON file. Nothing else." --allowedTools "Read,Write" > /tmp/stage1_retry_output.json 2>&1; then
              echo "::error::Stage 1 retry also failed. Output:"
              cat /tmp/stage1_retry_output.json 2>/dev/null || echo "(no output file)"
              exit 1
            fi
            # Verify retry result
            if ! python3 -c "import json; json.load(open('/tmp/articles/top10.json'))" 2>/dev/null; then
              echo "::error::Stage 1 retry produced malformed JSON. First 1000 chars:"
              head -c 1000 /tmp/articles/top10.json 2>/dev/null || echo "(file missing)"
              exit 1
            fi
            echo "Stage 1 retry succeeded"
          fi

          # Show selected articles
          python3 -c "
          import json
          top10 = json.load(open('/tmp/articles/top10.json'))
          print(f'Selected {len(top10)} articles for analysis')
          for a in top10:
              print(f'  #{a.get(\"rank\",\"?\")} {a[\"title\"][:60]}')
          "

      - name: Fetch full content for top 10 articles
        if: env.SKIP_DIGEST != 'true'
        run: |
          python3 -c "
          import json, subprocess
          top10 = json.load(open('/tmp/articles/top10.json'))
          print(f'Fetching full content for {len(top10)} articles...')
          for i, article in enumerate(top10):
              doc_id = article['id']
              print(f'  [{i+1}/{len(top10)}] {article.get(\"title\", doc_id)[:60]}...')
              result = subprocess.run(
                  ['readwise', 'reader-get-document-details', '--document-id', doc_id, '--json'],
                  capture_output=True, text=True, timeout=30
              )
              if result.returncode == 0:
                  details = json.loads(result.stdout)
                  content = details.get('content', '')
                  with open(f'/tmp/articles/{doc_id}.md', 'w') as f:
                      f.write(content)
                  print(f'    Saved {len(content)/1024:.0f} KB')
              else:
                  print(f'    FAILED: {result.stderr[:100]}')
          "

      - name: "Stage 2: Analyze each article (Sonnet — isolated calls)"
        if: env.SKIP_DIGEST != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Process each article in its own claude -p call (context resets between articles)
          python3 << 'PYTHON_SCRIPT'
          import json, subprocess, os

          top10 = json.load(open('/tmp/articles/top10.json'))
          total_cost = 0

          # Initialize the analyzed output file
          with open('/tmp/articles/analyzed.md', 'w') as f:
              f.write('')

          for i, article in enumerate(top10):
              doc_id = article['id']
              title = article.get('title', 'Untitled')
              author = article.get('author', 'Unknown')
              reading_time = article.get('reading_time', '')
              category = article.get('category', '')
              rank = article.get('rank', i + 1)
              content_path = f'/tmp/articles/{doc_id}.md'

              if not os.path.exists(content_path):
                  print(f'  [{i+1}/{len(top10)}] SKIP (no content): {title[:60]}')
                  continue

              # Skip very large files (books etc that slipped through triage)
              content_size = os.path.getsize(content_path)
              if content_size > 200_000:  # ~200KB = ~50K words
                  print(f'  [{i+1}/{len(top10)}] SKIP (too large: {content_size/1024:.0f}KB): {title[:60]}')
                  continue

              print(f'  [{i+1}/{len(top10)}] Analyzing: {title[:60]}...')

              prompt = f'''Analyze this article for a reading digest. The reader should get ~100% understanding without opening the original.

          Article metadata:
          - Title: {title}
          - Author: {author}
          - Reading time: {reading_time}
          - Category: {category}
          - Rank: {rank} of {len(top10)}

          Read the article from {content_path}.

          Produce this output and write it to /tmp/articles/{doc_id}_analysis.md:

          ### {title}
          **{author}** · {category} · {reading_time}

          [Numbered arguments scaled by reading time (~1 per 2 min). Each argument is 2-3 sentences with specific names, numbers, mechanisms, evidence.]

          **Quotable:**
          > "[best quote from the article]" — *[context]*

          ---

          CRITICAL RULES:
          - NEVER use meta-commentary. Do NOT write "the author argues" or "this piece explores." State actual claims, evidence, and conclusions directly.
          - BAD: "The author explores the tension between biomimicry and pragmatism."
          - GOOD: "Biomimicry may be a red herring — a slower, cruder hand that reliably grasps 90% of warehouse SKUs captures most economic value."
          - Scale arguments to length: 5-min article → 2-3, 10-min → 5, 20-min → 10.
          - Include specific numbers, names, and evidence. No vague summaries.'''

              try:
                  result = subprocess.run(
                      ['claude', '-p', '--model', 'sonnet', '--output-format', 'json',
                       prompt, '--allowedTools', 'Read,Write'],
                      capture_output=True, text=True, timeout=300
                  )
              except subprocess.TimeoutExpired:
                  print(f'    TIMEOUT (300s) — skipping')
                  continue

              if result.returncode == 0:
                  try:
                      output = json.loads(result.stdout)
                      u = output.get('usage', {})
                      inp = u.get('input_tokens', 0)
                      out = u.get('output_tokens', 0)
                      cr = u.get('cache_read_input_tokens', 0)
                      cc = u.get('cache_creation_input_tokens', 0)
                      cost = (inp / 1e6) * 3.0 + (out / 1e6) * 15.0 + (cr / 1e6) * 0.30 + (cc / 1e6) * 3.75
                      total_cost += cost
                      print(f'    Done: {inp:,} in / {out:,} out | ${cost:.3f}')
                  except:
                      print(f'    Done (could not parse stats)')

                  # Append analysis to combined file
                  analysis_path = f'/tmp/articles/{doc_id}_analysis.md'
                  if os.path.exists(analysis_path):
                      with open(analysis_path) as af:
                          analysis = af.read()
                      with open('/tmp/articles/analyzed.md', 'a') as f:
                          f.write(analysis + '\n\n')
                  else:
                      print(f'    WARNING: analysis file not created')
              else:
                  errmsg = result.stderr[:200] if result.stderr else result.stdout[:200]
                  print(f'    FAILED (exit {result.returncode}): {errmsg}')
                  # Don't crash — continue to next article

          print(f'\nStage 2 total cost: ${total_cost:.2f}')
          with open('/tmp/stage2_cost.txt', 'w') as f:
              f.write(f'Stage 2 (Sonnet x{len(top10)}): ${total_cost:.2f}')
          PYTHON_SCRIPT

      - name: "Stage 3: Assemble digest (Haiku — formatting only)"
        if: env.SKIP_DIGEST != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          TODAY=$(date +%Y-%m-%d)
          MONTH_DAY=$(date +"%B %d, %Y")

          if ! claude -p --model haiku --output-format json "You are assembling a daily reading digest from pre-analyzed articles.

          Read /tmp/articles/analyzed.md — it contains individual article analyses already written by an expert reviewer.
          Read /tmp/articles/top10.json — it contains the article rankings.

          Your job is ONLY formatting and assembly. Do NOT rewrite or alter the analysis content.

          Instructions:
          1. Pick the top 3 articles (rank 1-3) for the 'Today's Top 3' section. Add ⚡ signal to these.
          2. Add 📌 signal to ranks 4-7, 📎 signal to ranks 8-10.
          3. Group all articles by theme (e.g., AI, Finance, Tech Policy). If no clear theme, use 'Also Notable'.
          4. Insert the signal emoji after each article title in the analysis.

          Save to _digests/digest-${TODAY}.md with this front matter:
          ---
          layout: digest
          title: \"Reader Digest — ${MONTH_DAY}\"
          date: ${TODAY}
          ---

          Start the body with:
          ## Today's Top 3
          [the 3 must-read articles with their full analysis]

          Then themed sections with the remaining articles.

          Do NOT include a # h1 title. Do NOT add any content beyond what is in analyzed.md." --allowedTools "Read,Write" > /tmp/stage3_output.json 2>&1; then
            echo "::error::Stage 3 (assembly) failed. Output:"
            cat /tmp/stage3_output.json 2>/dev/null || echo "(no output file)"
            exit 1
          fi

          echo "Stage 3 complete"

          # Calculate total cost across all stages
          python3 -c "
          import json, os
          total_cost = 0
          stages = []

          # Stage 1 (Haiku)
          if os.path.exists('/tmp/stage1_output.json'):
              d = json.load(open('/tmp/stage1_output.json'))
              u = d.get('usage', {})
              inp, out = u.get('input_tokens', 0), u.get('output_tokens', 0)
              c = (inp / 1e6) * 0.80 + (out / 1e6) * 4.0
              total_cost += c
              stages.append(f'S1(Haiku): \${c:.3f}')

          # Stage 2 (Sonnet per-article) — read from cost file
          if os.path.exists('/tmp/stage2_cost.txt'):
              s2 = open('/tmp/stage2_cost.txt').read()
              # Extract dollar amount
              import re
              m = re.search(r'\\\$([0-9.]+)', s2)
              if m:
                  c2 = float(m.group(1))
                  total_cost += c2
                  stages.append(f'S2(Sonnet): \${c2:.2f}')

          # Stage 3 (Haiku)
          if os.path.exists('/tmp/stage3_output.json'):
              d = json.load(open('/tmp/stage3_output.json'))
              u = d.get('usage', {})
              inp, out = u.get('input_tokens', 0), u.get('output_tokens', 0)
              c = (inp / 1e6) * 0.80 + (out / 1e6) * 4.0
              total_cost += c
              stages.append(f'S3(Haiku): \${c:.3f}')

          summary = ' | '.join(stages) + f' | Total: \${total_cost:.2f}'
          print(summary)
          with open('/tmp/digest_cost.txt', 'w') as f:
              f.write(summary)
          with open(os.environ.get('GITHUB_ENV', '/dev/null'), 'a') as env:
              env.write(f'COST_LINE={summary}\n')
          " || echo "Could not parse usage stats"

      - name: Commit and push
        if: env.SKIP_DIGEST != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Stage any untracked/modified digest files Claude may not have committed
          git add _digests/
          if ! git diff --cached --quiet; then
            git commit -m "Add digest for $(date +%Y-%m-%d)"
          fi
          # Push everything (including any commits Claude made during generation)
          git pull --rebase
          git push

      - name: Email digest via Resend
        if: env.SKIP_DIGEST != 'true'
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          TODAY=$(date +%Y-%m-%d)
          DIGEST_FILE="_digests/digest-${TODAY}.md"

          if [ ! -f "$DIGEST_FILE" ]; then
            echo "No digest file for today, skipping email."
            exit 0
          fi

          # Read cost stats if available
          COST_LINE=""
          if [ -f /tmp/digest_cost.txt ]; then
            COST_LINE=$(cat /tmp/digest_cost.txt)
          fi

          # Strip YAML front matter and convert markdown to basic HTML
          BODY=$(sed '1{/^---$/!q;};1,/^---$/d' "$DIGEST_FILE" \
            | python3 -c "
          import sys, html, re, os
          md = sys.stdin.read()
          cost = os.environ.get('COST_LINE', '')
          # Escape HTML entities
          md = html.escape(md)
          # Bold
          md = re.sub(r'\*\*(.+?)\*\*', r'<strong>\1</strong>', md)
          # Italic
          md = re.sub(r'\*(.+?)\*', r'<em>\1</em>', md)
          # H3
          md = re.sub(r'^### (.+)$', r'<h3>\1</h3>', md, flags=re.MULTILINE)
          # H2
          md = re.sub(r'^## (.+)$', r'<h2>\1</h2>', md, flags=re.MULTILINE)
          # Blockquotes
          md = re.sub(r'^&gt; (.+)$', r'<blockquote>\1</blockquote>', md, flags=re.MULTILINE)
          # Unordered list items
          md = re.sub(r'^- (.+)$', r'<li>\1</li>', md, flags=re.MULTILINE)
          # Ordered list items (numbered arguments)
          md = re.sub(r'^\d+\. (.+)$', r'<li>\1</li>', md, flags=re.MULTILINE)
          # Paragraphs (double newline)
          md = re.sub(r'\n\n', r'</p><p>', md)
          # Single newlines to <br>
          md = re.sub(r'\n', r'<br>', md)
          footer = ''
          if cost:
              footer = f'<hr style=\"border:none;border-top:1px solid #eee;margin:24px 0 12px\"><p style=\"color:#999;font-size:12px\">{html.escape(cost)}</p>'
          print('<div style=\"font-family: -apple-system, sans-serif; max-width: 680px; margin: 0 auto; padding: 20px; line-height: 1.6;\"><p>' + md + '</p>' + footer + '</div>')
          ")

          MONTH_DAY=$(date +"%B %d, %Y")

          curl -s -X POST 'https://api.resend.com/emails' \
            -H "Authorization: Bearer ${RESEND_API_KEY}" \
            -H 'Content-Type: application/json' \
            -d "$(python3 -c "
          import json, sys
          body = sys.stdin.read()
          print(json.dumps({
            'from': 'Reader Digest <onboarding@resend.dev>',
            'to': ['rohit@rohitkaul.com'],
            'subject': 'Reader Digest — ${MONTH_DAY}',
            'html': body
          }))
          " <<< "$BODY")"

          echo "Digest email sent!"

