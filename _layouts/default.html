<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
  <style>
    :root {
      --bg: #ffffff;
      --text: #1a1a2e;
      --text-secondary: #555;
      --border: #e0e0e0;
      --link: #2563eb;
      --link-hover: #1d4ed8;
      --blockquote-bg: #f8f9fa;
      --blockquote-border: #6366f1;
      --blockquote-text: #374151;
      --h2-color: #6366f1;
      --h3-color: #1a1a2e;
      --code-bg: #f3f4f6;
      --card-shadow: 0 1px 3px rgba(0,0,0,0.06);
      --hr-color: #e5e7eb;
      --nav-bg: #f8f9fa;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a;
        --text: #e2e8f0;
        --text-secondary: #94a3b8;
        --border: #334155;
        --link: #818cf8;
        --link-hover: #a5b4fc;
        --blockquote-bg: #1e293b;
        --blockquote-border: #818cf8;
        --blockquote-text: #cbd5e1;
        --h2-color: #a78bfa;
        --h3-color: #e2e8f0;
        --code-bg: #1e293b;
        --card-shadow: 0 1px 3px rgba(0,0,0,0.3);
        --hr-color: #334155;
        --nav-bg: #1e293b;
      }
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      font-size: 17px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      line-height: 1.7;
    }

    .container {
      max-width: 780px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }

    nav {
      padding: 1rem 0;
      margin-bottom: 2rem;
      border-bottom: 1px solid var(--border);
    }

    nav a {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    nav a:hover {
      color: var(--link);
    }

    .site-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      line-height: 1.25;
      letter-spacing: -0.02em;
    }

    h2 {
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--h2-color);
      margin-top: 2.5rem;
      margin-bottom: 1rem;
      padding-bottom: 0.4rem;
      border-bottom: 2px solid var(--h2-color);
    }

    h3 {
      font-size: 1.15rem;
      font-weight: 650;
      color: var(--h3-color);
      margin-top: 2rem;
      margin-bottom: 0.6rem;
      line-height: 1.35;
    }

    h4 {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-top: 1.3rem;
      margin-bottom: 0.5rem;
    }

    p {
      margin-bottom: 1rem;
    }

    a {
      color: var(--link);
      text-decoration: none;
    }

    a:hover {
      color: var(--link-hover);
      text-decoration: underline;
    }

    ul, ol {
      margin-bottom: 1rem;
      padding-left: 1.5rem;
    }

    li {
      margin-bottom: 0.5rem;
    }

    blockquote {
      background: var(--blockquote-bg);
      border-left: 4px solid var(--blockquote-border);
      margin: 1.2rem 0;
      padding: 1rem 1.25rem;
      border-radius: 0 8px 8px 0;
      color: var(--blockquote-text);
      font-style: italic;
      line-height: 1.65;
    }

    blockquote p {
      margin-bottom: 0;
    }

    blockquote p + p {
      margin-top: 0.75rem;
    }

    hr {
      border: none;
      border-top: 1px solid var(--hr-color);
      margin: 2rem 0;
    }

    strong {
      font-weight: 650;
    }

    em {
      font-style: italic;
    }

    code {
      background: var(--code-bg);
      padding: 0.15em 0.4em;
      border-radius: 4px;
      font-size: 0.9em;
    }

    .digest-list {
      list-style: none;
      padding: 0;
      margin-top: 1.5rem;
    }

    .digest-list li {
      padding: 1rem 0;
      border-bottom: 1px solid var(--border);
    }

    .digest-list li:last-child {
      border-bottom: none;
    }

    .digest-list a {
      font-weight: 600;
      font-size: 1.05rem;
    }

    .digest-list .date {
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-left: 0.5rem;
    }

    .subtitle {
      color: var(--text-secondary);
      font-size: 1.05rem;
      margin-bottom: 2rem;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 1.5rem;
      font-size: 0.9rem;
      color: var(--text-secondary);
      font-weight: 500;
    }

    .back-link:hover {
      color: var(--link);
      text-decoration: none;
    }

    .page-date {
      color: var(--text-secondary);
      font-size: 0.95rem;
      margin-bottom: 2rem;
    }

    footer {
      margin-top: 4rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      color: var(--text-secondary);
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <nav>
      <span class="site-title">{{ site.title }}</span>
    </nav>

    {{ content }}

    <footer>
      Generated by <a href="https://github.com/rohitkaulcoder/reader-digests">Claude Reader Digest</a>
    </footer>
  </div>
</body>
</html>
